[build]
  command = "npm run build"
  publish = "dist"

# Proxy /api requests to the Render backend to avoid CORS issues
[[redirects]]
  from = "/api/*"
  to = "https://drewai.onrender.com/api/:splat"
  status = 200
  force = true

# Catch-all for SPA routing (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
